<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>DreamSync — Wind Down Before Sleep</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <style>
        :root {
            --void: #0a0e27;
            --twilight: #1b1642;
            --lavender: #a78bfa;
            --moonglow: #ffe8c2;
            --teal: #5fd8c9;
            --mist: rgba(230, 225, 255, 0.7);
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--void);
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        @font-face {
            font-family: 'Fraunces';
            src: local('Georgia');
        }

        #canvas-holder {
            position: fixed;
            inset: 0;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 6vh 5vw;
            box-sizing: border-box;
            z-index: 10;
            transition: opacity 1.2s ease;
        }

        .overlay.hidden-ui {
            opacity: 0;
        }

        .brand {
            text-align: center;
            pointer-events: none;
        }

        .brand h1 {
            font-family: Georgia, 'Fraunces', serif;
            font-weight: 400;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            letter-spacing: 0.04em;
            color: var(--mist);
            margin: 0;
            text-shadow: 0 0 40px rgba(167, 139, 250, 0.4);
        }

        .brand p {
            margin: 0.4em 0 0;
            color: rgba(230, 225, 255, 0.45);
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .breath-label {
            font-family: Georgia, serif;
            font-weight: 400;
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            color: var(--moonglow);
            letter-spacing: 0.08em;
            opacity: 0.9;
            text-shadow: 0 0 30px rgba(255, 232, 194, 0.5);
            min-height: 1.6em;
        }

        .controls {
            display: flex;
            gap: 14px;
            align-items: center;
            pointer-events: all;
        }

        .btn {
            pointer-events: all;
            background: rgba(167, 139, 250, 0.12);
            border: 1px solid rgba(167, 139, 250, 0.4);
            color: var(--mist);
            padding: 0.8em 1.6em;
            border-radius: 999px;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: background 0.3s ease, transform 0.2s ease, border-color 0.3s ease;
        }

        .btn:hover {
            background: rgba(167, 139, 250, 0.25);
            border-color: var(--lavender);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn.primary {
            background: rgba(255, 232, 194, 0.15);
            border-color: rgba(255, 232, 194, 0.5);
        }

        .btn.primary:hover {
            background: rgba(255, 232, 194, 0.3);
        }

        .hint {
            position: fixed;
            bottom: 3vh;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(230, 225, 255, 0.3);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 5;
        }

        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 20;
            background: radial-gradient(ellipse at center, var(--twilight) 0%, var(--void) 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2em;
            transition: opacity 1s ease;
        }

        #start-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #start-screen h1 {
            font-family: Georgia, serif;
            font-weight: 400;
            font-size: clamp(2.2rem, 6vw, 3.5rem);
            color: var(--mist);
            letter-spacing: 0.03em;
            margin: 0;
            text-align: center;
            text-shadow: 0 0 50px rgba(167, 139, 250, 0.5);
        }

        #start-screen .sub {
            color: rgba(230, 225, 255, 0.5);
            font-size: 0.95rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="start-screen">
        <h1>DreamSync</h1>
        <div class="sub">A quiet space before sleep</div>
        <button class="btn primary" id="enter-btn" style="pointer-events:all;">Begin</button>
    </div>

    <div id="canvas-holder"></div>

    <div class="overlay" id="ui">
        <div class="brand">
            <h1>DreamSync</h1>
            <p>Breathe with the light</p>
        </div>

        <div class="breath-label" id="breath-label">Settle in...</div>

        <div class="controls">
            <button class="btn" id="vr-btn">Enter VR</button>
            <button class="btn" id="sound-btn">Sound: Off</button>
            <button class="btn" id="hide-btn">Hide UI</button>
        </div>
    </div>

    <div class="hint">Drag to look around · Works in a headset if connected</div>

    <script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.js"
  }
}
</script>

    <script type="module">
        import * as THREE from 'three';

        // ---------- Scene setup ----------
        const holder = document.getElementById('canvas-holder');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0e27, 0.035);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 1.6, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.xr.enabled = true;
        holder.appendChild(renderer.domElement);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ---------- Starfield ----------
        function makeStarfield(count, radius, size, color) {
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const r = radius * (0.5 + Math.random() * 0.5);
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.cos(phi) * 0.6 + 2;
                positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ color, size, transparent: true, opacity: 0.8, sizeAttenuation: true });
            return new THREE.Points(geo, mat);
        }
        const stars = makeStarfield(1200, 60, 0.12, 0xE6E1FF);
        scene.add(stars);
        const stars2 = makeStarfield(400, 35, 0.2, 0xA78BFA);
        scene.add(stars2);

        // ---------- Drifting fireflies (particles) ----------
        const fireflyCount = 140;
        const fireflyGeo = new THREE.BufferGeometry();
        const fPos = new Float32Array(fireflyCount * 3);
        const fSeed = new Float32Array(fireflyCount);
        for (let i = 0; i < fireflyCount; i++) {
            fPos[i * 3] = (Math.random() - 0.5) * 20;
            fPos[i * 3 + 1] = Math.random() * 8;
            fPos[i * 3 + 2] = (Math.random() - 0.5) * 20;
            fSeed[i] = Math.random() * Math.PI * 2;
        }
        fireflyGeo.setAttribute('position', new THREE.BufferAttribute(fPos, 3));
        const fireflyMat = new THREE.PointsMaterial({
            color: 0x5fd8c9, size: 0.15, transparent: true, opacity: 0.75, sizeAttenuation: true
        });
        const fireflies = new THREE.Points(fireflyGeo, fireflyMat);
        scene.add(fireflies);

        // ---------- The Dream Orb (breathing guide) ----------
        const orbGroup = new THREE.Group();
        scene.add(orbGroup);

        const orbGeo = new THREE.SphereGeometry(1, 64, 64);
        const orbMat = new THREE.MeshBasicMaterial({
            color: 0xffe8c2,
            transparent: true,
            opacity: 0.9,
        });
        const orb = new THREE.Mesh(orbGeo, orbMat);
        orbGroup.add(orb);

        // glow shells
        function addGlowShell(scale, opacity, color) {
            const g = new THREE.SphereGeometry(1, 48, 48);
            const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.BackSide });
            const mesh = new THREE.Mesh(g, m);
            mesh.scale.setScalar(scale);
            orbGroup.add(mesh);
            return mesh;
        }
        addGlowShell(1.25, 0.18, 0xffe8c2);
        addGlowShell(1.6, 0.10, 0xa78bfa);
        addGlowShell(2.1, 0.06, 0xa78bfa);

        orbGroup.position.set(0, 1.6, -3);

        // soft point light feel via emissive-like additive sprite (kept simple, MeshBasicMaterial already unlit)

        // ---------- Breathing cycle ----------
        // 4s inhale, 4s hold, 6s exhale, 2s hold  (calming extended exhale pattern)
        const breathLabel = document.getElementById('breath-label');
        const cyclePhases = [
            { name: 'Breathe in...', duration: 4, target: 1.35 },
            { name: 'Hold...', duration: 4, target: 1.35 },
            { name: 'Breathe out...', duration: 6, target: 0.85 },
            { name: 'Hold...', duration: 2, target: 0.85 },
        ];
        let phaseIndex = 0;
        let phaseTime = 0;
        let scaleFrom = 0.85, scaleTo = 1.35;

        function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }

        let currentScale = 0.85;

        function updateBreath(dt) {
            phaseTime += dt;
            const phase = cyclePhases[phaseIndex];
            const t = Math.min(phaseTime / phase.duration, 1);
            const eased = easeInOutSine(t);
            currentScale = scaleFrom + (scaleTo - scaleFrom) * eased;

            if (phaseTime >= phase.duration) {
                phaseTime = 0;
                scaleFrom = scaleTo;
                phaseIndex = (phaseIndex + 1) % cyclePhases.length;
                const next = cyclePhases[phaseIndex];
                scaleTo = next.target;
                breathLabel.textContent = next.name;
            }
            orbGroup.scale.setScalar(currentScale);
        }
        breathLabel.textContent = cyclePhases[0].name;

        // ---------- Ambient audio (generated, no external files, no copyright concerns) ----------
        let audioCtx, masterGain, droneOsc1, droneOsc2, lfo, lfoGain, noiseSource, noiseGain;
        let soundOn = false;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            masterGain.connect(audioCtx.destination);

            // Two detuned low sine drones (calming pad)
            droneOsc1 = audioCtx.createOscillator();
            droneOsc1.type = 'sine';
            droneOsc1.frequency.value = 110; // A2
            const g1 = audioCtx.createGain(); g1.gain.value = 0.5;
            droneOsc1.connect(g1).connect(masterGain);

            droneOsc2 = audioCtx.createOscillator();
            droneOsc2.type = 'sine';
            droneOsc2.frequency.value = 110 * 1.5; // perfect fifth above, soft
            const g2 = audioCtx.createGain(); g2.gain.value = 0.25;
            droneOsc2.connect(g2).connect(masterGain);

            // slow LFO modulating drone1 volume for a "breathing" swell
            lfo = audioCtx.createOscillator();
            lfo.frequency.value = 1 / 16; // full swell cycle ~16s
            lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 0.15;
            lfo.connect(lfoGain);
            lfoGain.connect(g1.gain);

            // gentle filtered noise like distant wind
            const bufferSize = 2 * audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = (Math.random() * 2 - 1) * 0.3; }
            noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buffer;
            noiseSource.loop = true;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.value = 400;
            noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0.15;
            noiseSource.connect(noiseFilter).connect(noiseGain).connect(masterGain);

            droneOsc1.start(); droneOsc2.start(); lfo.start(); noiseSource.start();
        }

        function toggleSound() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            soundOn = !soundOn;
            const target = soundOn ? 0.35 : 0.0;
            masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
            masterGain.gain.linearRampToValueAtTime(target, audioCtx.currentTime + 1.5);
            document.getElementById('sound-btn').textContent = 'Sound: ' + (soundOn ? 'On' : 'Off');
        }
        document.getElementById('sound-btn').addEventListener('click', toggleSound);

        // ---------- Look-around (drag) controls, desktop + touch ----------
        let isDragging = false, prevX = 0, prevY = 0;
        let yaw = 0, pitch = 0;
        const domEl = renderer.domElement;

        function onDown(x, y) { isDragging = true; prevX = x; prevY = y; }
        function onMove(x, y) {
            if (!isDragging) return;
            const dx = x - prevX, dy = y - prevY;
            prevX = x; prevY = y;
            yaw -= dx * 0.003;
            pitch -= dy * 0.003;
            pitch = Math.max(-1.0, Math.min(1.0, pitch));
        }
        function onUp() { isDragging = false; }

        domEl.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', onUp);
        domEl.addEventListener('touchstart', e => { const t = e.touches[0]; onDown(t.clientX, t.clientY); }, { passive: true });
        window.addEventListener('touchmove', e => { const t = e.touches[0]; onMove(t.clientX, t.clientY); }, { passive: true });
        window.addEventListener('touchend', onUp);

        // ---------- WebXR VR button ----------
        const vrBtn = document.getElementById('vr-btn');
        async function setupXR() {
            if ('xr' in navigator) {
                try {
                    const supported = await navigator.xr.isSessionSupported('immersive-vr');
                    if (!supported) { vrBtn.textContent = 'VR not available'; vrBtn.disabled = true; return; }
                } catch (e) { vrBtn.textContent = 'VR not available'; vrBtn.disabled = true; return; }
            } else {
                vrBtn.textContent = 'VR not supported'; vrBtn.disabled = true; return;
            }
            vrBtn.addEventListener('click', async () => {
                if (renderer.xr.isPresenting) return;
                try {
                    const session = await navigator.xr.requestSession('immersive-vr', { optionalFeatures: ['local-floor'] });
                    renderer.xr.setSession(session);
                    vrBtn.textContent = 'In VR...';
                    session.addEventListener('end', () => { vrBtn.textContent = 'Enter VR'; });
                } catch (err) {
                    console.log('XR session request failed', err);
                }
            });
        }
        setupXR();

        // ---------- UI hide toggle ----------
        const uiEl = document.getElementById('ui');
        document.getElementById('hide-btn').addEventListener('click', () => {
            uiEl.classList.toggle('hidden-ui');
        });

        // ---------- Start screen ----------
        document.getElementById('enter-btn').addEventListener('click', () => {
            document.getElementById('start-screen').classList.add('fade-out');
            setTimeout(() => document.getElementById('start-screen').style.display = 'none', 1100);
            if (!audioCtx) initAudio();
        });

        // ---------- Animation loop ----------
        const clock = new THREE.Clock();

        function animateFrame() {
            const dt = clock.getDelta();
            const elapsed = clock.elapsedTime;

            updateBreath(dt);

            // gentle camera drift via drag look
            if (!renderer.xr.isPresenting) {
                camera.rotation.order = 'YXZ';
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;
                camera.position.y = 1.6 + Math.sin(elapsed * 0.15) * 0.05;
            }

            // slow star rotation
            stars.rotation.y += dt * 0.005;
            stars2.rotation.y -= dt * 0.003;

            // fireflies drift
            const posAttr = fireflyGeo.attributes.position;
            for (let i = 0; i < fireflyCount; i++) {
                const seed = fSeed[i];
                posAttr.array[i * 3] += Math.sin(elapsed * 0.3 + seed) * 0.002;
                posAttr.array[i * 3 + 1] += Math.cos(elapsed * 0.2 + seed * 1.3) * 0.0015;
                posAttr.array[i * 3 + 2] += Math.sin(elapsed * 0.25 + seed * 0.7) * 0.002;
            }
            posAttr.needsUpdate = true;

            // orb subtle color pulse tied to breath phase
            const t = (Math.sin(elapsed * 0.5) + 1) / 2;
            orb.material.color.setRGB(1, 0.91 - t * 0.05, 0.76 + t * 0.08);

            renderer.render(scene, camera);
        }
        renderer.setAnimationLoop(animateFrame);
    </script>
</body>

</html>
