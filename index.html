<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>DreamSync — Wind Down Before Sleep</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<style>
  :root{
    --void: #060a1f;
    --twilight: #1b1642;
    --lavender: #a78bfa;
    --moonglow: #ffe8c2;
    --teal: #5fd8c9;
    --mist: rgba(230,225,255,0.7);
  }
  html, body {
    margin:0; padding:0; width:100%; height:100%;
    background: var(--void);
    overflow:hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-user-select:none; user-select:none;
  }
  #canvas-holder { position:fixed; inset:0; }
  canvas { display:block; touch-action:none; }

  .overlay {
    position:fixed; inset:0;
    pointer-events:none;
    display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    padding: 6vh 5vw;
    box-sizing:border-box;
    z-index:10;
    transition: opacity 1.2s ease;
  }
  .overlay.hidden-ui { opacity:0; }

  .brand { text-align:center; pointer-events:none; }
  .brand h1 {
    font-family: Georgia, serif;
    font-weight:400;
    font-size: clamp(1.6rem, 4.5vw, 2.6rem);
    letter-spacing: 0.04em;
    color: var(--mist);
    margin:0;
    text-shadow: 0 0 40px rgba(167,139,250,0.4);
  }
  .brand p {
    margin: 0.4em 0 0;
    color: rgba(230,225,255,0.45);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .breath-label {
    font-family: Georgia, serif;
    font-weight: 400;
    font-size: clamp(1rem, 2.8vw, 1.4rem);
    color: var(--moonglow);
    letter-spacing: 0.08em;
    opacity: 0.9;
    text-shadow: 0 0 30px rgba(255,232,194,0.5);
    min-height: 1.6em;
  }

  .controls { display:flex; gap: 12px; align-items:center; pointer-events:all; flex-wrap:wrap; justify-content:center; }
  .btn {
    pointer-events:all;
    background: rgba(167,139,250,0.12);
    border: 1px solid rgba(167,139,250,0.4);
    color: var(--mist);
    padding: 0.75em 1.4em;
    border-radius: 999px;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    cursor:pointer;
    backdrop-filter: blur(6px);
    transition: background 0.3s ease, transform 0.2s ease, border-color 0.3s ease;
    white-space:nowrap;
  }
  .btn:hover { background: rgba(167,139,250,0.25); border-color: var(--lavender); }
  .btn:active { transform: scale(0.96); }
  .btn.primary { background: rgba(255,232,194,0.15); border-color: rgba(255,232,194,0.5); }
  .btn.primary:hover { background: rgba(255,232,194,0.3); }

  .hint {
    position:fixed; bottom: 2.2vh; left:0; right:0;
    text-align:center; color: rgba(230,225,255,0.32);
    font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    pointer-events:none; z-index: 5;
  }

  #start-screen {
    position:fixed; inset:0; z-index:20;
    background: radial-gradient(ellipse at center, var(--twilight) 0%, var(--void) 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 2em; transition: opacity 1s ease;
  }
  #start-screen.fade-out { opacity:0; pointer-events:none; }
  #start-screen h1 {
    font-family: Georgia, serif; font-weight:400;
    font-size: clamp(2rem, 5.5vw, 3.3rem);
    color: var(--mist); letter-spacing: 0.03em; margin:0; text-align:center;
    text-shadow: 0 0 50px rgba(167,139,250,0.5);
  }
  #start-screen .sub {
    color: rgba(230,225,255,0.5); font-size: 0.9rem;
    letter-spacing: 0.1em; text-transform: uppercase; text-align:center;
  }

  /* Virtual joystick (touch) */
  #joystick-zone {
    position: fixed; left: 0; bottom: 0; width: 45vw; height: 45vh;
    z-index: 15; touch-action:none; display:none;
  }
  #joystick-zone.active { display:block; }
  #joy-base {
    position:absolute; width:110px; height:110px; border-radius:50%;
    background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.35);
    backdrop-filter: blur(4px);
  }
  #joy-knob {
    position:absolute; width:50px; height:50px; border-radius:50%;
    background: rgba(255,232,194,0.25); border: 1px solid rgba(255,232,194,0.6);
    transform: translate(-50%,-50%);
  }
</style>
</head>
<body>

<div id="start-screen">
  <h1>DreamSync</h1>
  <div class="sub">A vast, quiet world before sleep</div>
  <button class="btn primary" id="enter-btn" style="pointer-events:all;">Begin</button>
</div>

<div id="canvas-holder"></div>

<div id="joystick-zone">
  <div id="joy-base"></div>
  <div id="joy-knob"></div>
</div>

<div class="overlay" id="ui">
  <div class="brand">
    <h1>DreamSync</h1>
    <p>Breathe with the light · Walk the dreamscape</p>
  </div>

  <div class="breath-label" id="breath-label">Settle in...</div>

  <div class="controls">
    <button class="btn" id="vr-btn">Enter VR</button>
    <button class="btn" id="sound-btn">Sound: Off</button>
    <button class="btn" id="hide-btn">Hide UI</button>
  </div>
</div>

<div class="hint" id="hint">Drag to look · WASD or joystick to walk · Works in a headset if connected</div>

<script type="importmap">
{
  "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.js" }
}
</script>

<script type="module">
import * as THREE from 'three';

// ================= Scene =================
const holder = document.getElementById('canvas-holder');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a1230, 0.012); // thinner fog = far vistas feel vast

const camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 400);
camera.position.set(0, 1.7, 8);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.xr.enabled = true;
holder.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ================= Sky gradient dome =================
const skyGeo = new THREE.SphereGeometry(300, 32, 32);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    topColor: { value: new THREE.Color(0x0a0e2c) },
    midColor: { value: new THREE.Color(0x241a4a) },
    botColor: { value: new THREE.Color(0x4a3570) },
  },
  vertexShader: `
    varying vec3 vWorldPos;
    void main(){
      vec4 wp = modelMatrix * vec4(position,1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    varying vec3 vWorldPos;
    uniform vec3 topColor; uniform vec3 midColor; uniform vec3 botColor;
    void main(){
      float h = normalize(vWorldPos).y;
      vec3 col = h > 0.0 ? mix(midColor, topColor, smoothstep(0.0,0.7,h))
                          : mix(midColor, botColor, smoothstep(0.0,-0.5,h));
      gl_FragColor = vec4(col, 1.0);
    }
  `
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// ================= Moon =================
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(6, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xfff2d8 })
);
moon.position.set(-60, 45, -140);
scene.add(moon);
const moonHalo = new THREE.Mesh(
  new THREE.SphereGeometry(9, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffe8c2, transparent:true, opacity:0.15 })
);
moonHalo.position.copy(moon.position);
scene.add(moonHalo);

// ================= Distant mountain silhouettes (layered for parallax depth) =================
function makeMountainRange(radius, height, segments, color, opacity, yOffset){
  const pts = [];
  for (let i=0;i<=segments;i++){
    const a = (i/segments)*Math.PI*2;
    const r = radius + Math.sin(a*5)*6 + Math.sin(a*13)*3;
    const h = height * (0.5 + 0.5*Math.abs(Math.sin(a*4 + Math.cos(a*2))));
    pts.push(new THREE.Vector3(Math.cos(a)*r, yOffset, Math.sin(a)*r));
    pts.push(new THREE.Vector3(Math.cos(a)*r, yOffset+h, Math.sin(a)*r));
  }
  const geo = new THREE.BufferGeometry();
  const positions = [];
  for (let i=0;i<segments;i++){
    const i0=i*2, i1=i*2+1, i2=i*2+2, i3=i*2+3;
    const p0=pts[i0],p1=pts[i1],p2=pts[i2],p3=pts[i3];
    positions.push(p0.x,p0.y,p0.z, p1.x,p1.y,p1.z, p2.x,p2.y,p2.z);
    positions.push(p1.x,p1.y,p1.z, p3.x,p3.y,p3.z, p2.x,p2.y,p2.z);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity, side:THREE.DoubleSide, fog:true });
  return new THREE.Mesh(geo, mat);
}
scene.add(makeMountainRange(150, 40, 48, 0x1a1440, 0.9, -2));
scene.add(makeMountainRange(190, 55, 48, 0x120f33, 0.85, -2));
scene.add(makeMountainRange(230, 70, 40, 0x0c0a26, 0.8, -2));

// ================= Vast misty ground / dream ocean =================
const groundGeo = new THREE.CircleGeometry(280, 96);
const groundMat = new THREE.MeshBasicMaterial({ color: 0x140f38, transparent:true, opacity:0.95 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = 0;
scene.add(ground);

// subtle rippled mist plane just above ground, additive, animated
const mistGeo = new THREE.PlaneGeometry(400, 400, 60, 60);
const mistMat = new THREE.MeshBasicMaterial({ color: 0x8b7fd6, transparent:true, opacity:0.06, side: THREE.DoubleSide });
const mistPlane = new THREE.Mesh(mistGeo, mistMat);
mistPlane.rotation.x = -Math.PI/2;
mistPlane.position.y = 0.4;
scene.add(mistPlane);
const mistPosAttr = mistGeo.attributes.position;
const mistBase = mistPosAttr.array.slice();

// ================= Floating islands (indulgent set-dressing) =================
function makeFloatingIsland(x, y, z, scale, hue){
  const group = new THREE.Group();
  const rock = new THREE.Mesh(
    new THREE.ConeGeometry(2.4*scale, 1.6*scale, 6),
    new THREE.MeshBasicMaterial({ color: hue, flatShading:true })
  );
  rock.rotation.x = Math.PI;
  group.add(rock);
  const top = new THREE.Mesh(
    new THREE.CylinderGeometry(2.4*scale, 2.6*scale, 0.3*scale, 6),
    new THREE.MeshBasicMaterial({ color: 0x6ee7d8, transparent:true, opacity:0.85 })
  );
  top.position.y = 0.15*scale;
  group.add(top);
  // small glow underneath
  const glow = new THREE.PointLight ? null : null; // skip real lights, keep unlit style
  group.position.set(x,y,z);
  group.userData.bobSeed = Math.random()*Math.PI*2;
  group.userData.baseY = y;
  return group;
}
const islands = [];
const islandSpecs = [
  [22, 9, -30, 1.6, 0x4a3f8a],
  [-28, 12, -45, 2.2, 0x3d3475],
  [40, 7, -65, 1.3, 0x574a9c],
  [-18, 14, -80, 2.6, 0x453a85],
  [8, 10, -100, 1.8, 0x3a3170],
  [-45, 8, -25, 1.2, 0x4f4396],
];
islandSpecs.forEach(([x,y,z,s,h]) => {
  const isl = makeFloatingIsland(x,y,z,s,h);
  scene.add(isl);
  islands.push(isl);
});

// ================= Starfield =================
function makeStarfield(count, radius, size, color) {
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count*3);
  for (let i=0; i<count; i++){
    const r = radius * (0.6 + Math.random()*0.4);
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos((Math.random()*1.4)-0.4); // bias upward, avoid ground clutter
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = Math.abs(r * Math.cos(phi)) + 8;
    positions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color, size, transparent:true, opacity:0.85, sizeAttenuation:true });
  return new THREE.Points(geo, mat);
}
const stars = makeStarfield(2200, 220, 0.35, 0xE6E1FF);
scene.add(stars);
const stars2 = makeStarfield(700, 150, 0.5, 0xA78BFA);
scene.add(stars2);

// ================= Drifting fireflies =================
const fireflyCount = 220;
const fireflyGeo = new THREE.BufferGeometry();
const fPos = new Float32Array(fireflyCount*3);
const fSeed = new Float32Array(fireflyCount);
for (let i=0;i<fireflyCount;i++){
  fPos[i*3]   = (Math.random()-0.5)*70;
  fPos[i*3+1] = 0.5 + Math.random()*10;
  fPos[i*3+2] = (Math.random()-0.5)*70;
  fSeed[i] = Math.random()*Math.PI*2;
}
fireflyGeo.setAttribute('position', new THREE.BufferAttribute(fPos,3));
const fireflyMat = new THREE.PointsMaterial({ color: 0x5fd8c9, size: 0.22, transparent:true, opacity:0.8, sizeAttenuation:true });
const fireflies = new THREE.Points(fireflyGeo, fireflyMat);
scene.add(fireflies);

// ================= The Dream Orb (breathing guide, stays near player start) =================
const orbGroup = new THREE.Group();
scene.add(orbGroup);
const orb = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0xffe8c2, transparent:true, opacity: 0.9 })
);
orbGroup.add(orb);
function addGlowShell(scale, opacity, color){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(1, 48, 48),
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity, side: THREE.BackSide })
  );
  mesh.scale.setScalar(scale);
  orbGroup.add(mesh);
}
addGlowShell(1.25, 0.18, 0xffe8c2);
addGlowShell(1.6, 0.10, 0xa78bfa);
addGlowShell(2.1, 0.06, 0xa78bfa);
orbGroup.position.set(0, 1.8, -4);

// ================= Breathing cycle =================
const breathLabel = document.getElementById('breath-label');
const cyclePhases = [
  { name: 'Breathe in...', duration: 4, target: 1.35 },
  { name: 'Hold...',       duration: 4, target: 1.35 },
  { name: 'Breathe out...',duration: 6, target: 0.85 },
  { name: 'Hold...',       duration: 2, target: 0.85 },
];
let phaseIndex = 0, phaseTime = 0, scaleFrom = 0.85, scaleTo = 1.35, currentScale = 0.85;
function easeInOutSine(t){ return -(Math.cos(Math.PI*t)-1)/2; }
function updateBreath(dt){
  phaseTime += dt;
  const phase = cyclePhases[phaseIndex];
  const t = Math.min(phaseTime/phase.duration, 1);
  currentScale = scaleFrom + (scaleTo-scaleFrom)*easeInOutSine(t);
  if (phaseTime >= phase.duration){
    phaseTime = 0; scaleFrom = scaleTo;
    phaseIndex = (phaseIndex+1) % cyclePhases.length;
    const next = cyclePhases[phaseIndex];
    scaleTo = next.target;
    breathLabel.textContent = next.name;
  }
  orbGroup.scale.setScalar(currentScale);
}
breathLabel.textContent = cyclePhases[0].name;

// ================= Ambient audio =================
let audioCtx, masterGain, droneOsc1, droneOsc2, lfo, lfoGain, noiseSource;
let soundOn = false;
function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(audioCtx.destination);

  droneOsc1 = audioCtx.createOscillator(); droneOsc1.type = 'sine'; droneOsc1.frequency.value = 110;
  const g1 = audioCtx.createGain(); g1.gain.value = 0.5;
  droneOsc1.connect(g1).connect(masterGain);

  droneOsc2 = audioCtx.createOscillator(); droneOsc2.type = 'sine'; droneOsc2.frequency.value = 110*1.5;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.25;
  droneOsc2.connect(g2).connect(masterGain);

  lfo = audioCtx.createOscillator(); lfo.frequency.value = 1/16;
  lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.15;
  lfo.connect(lfoGain); lfoGain.connect(g1.gain);

  const bufferSize = 2*audioCtx.sampleRate;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1)*0.3; }
  noiseSource = audioCtx.createBufferSource(); noiseSource.buffer = buffer; noiseSource.loop = true;
  const noiseFilter = audioCtx.createBiquadFilter(); noiseFilter.type='lowpass'; noiseFilter.frequency.value=400;
  const noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0.15;
  noiseSource.connect(noiseFilter).connect(noiseGain).connect(masterGain);

  droneOsc1.start(); droneOsc2.start(); lfo.start(); noiseSource.start();
}
function toggleSound(){
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  soundOn = !soundOn;
  const target = soundOn ? 0.35 : 0.0;
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(target, audioCtx.currentTime + 1.5);
  document.getElementById('sound-btn').textContent = 'Sound: ' + (soundOn ? 'On' : 'Off');
}
document.getElementById('sound-btn').addEventListener('click', toggleSound);

// ================= Look-around (drag) =================
let isDragging = false, prevX=0, prevY=0;
let yaw = 0, pitch = 0;
const domEl = renderer.domElement;
function onDown(x,y){ isDragging = true; prevX = x; prevY = y; }
function onMove(x,y){
  if (!isDragging) return;
  const dx = x - prevX, dy = y - prevY;
  prevX = x; prevY = y;
  yaw -= dx * 0.003;
  pitch -= dy * 0.003;
  pitch = Math.max(-1.0, Math.min(1.0, pitch));
}
function onUp(){ isDragging = false; }
domEl.addEventListener('mousedown', e => { if(e.target===domEl) onDown(e.clientX, e.clientY); });
window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
window.addEventListener('mouseup', onUp);

// touch look (right side of screen reserved for looking, left for joystick)
domEl.addEventListener('touchstart', e => {
  for (const t of e.touches){
    if (t.clientX > window.innerWidth*0.45) { onDown(t.clientX, t.clientY); }
  }
}, {passive:true});
window.addEventListener('touchmove', e => {
  for (const t of e.touches){
    if (t.clientX > window.innerWidth*0.45) { onMove(t.clientX, t.clientY); }
  }
}, {passive:true});
window.addEventListener('touchend', onUp);

// ================= Walking movement: WASD + touch joystick + VR thumbstick =================
const moveState = { forward:0, right:0 };
const keyMap = { KeyW:'forward1', KeyS:'forward-1', KeyA:'right-1', KeyD:'right1',
                 ArrowUp:'forward1', ArrowDown:'forward-1', ArrowLeft:'right-1', ArrowRight:'right1' };
const keysDown = new Set();
window.addEventListener('keydown', e => keysDown.add(e.code));
window.addEventListener('keyup', e => keysDown.delete(e.code));
function computeKeyboardMove(){
  let f=0, r=0;
  if (keysDown.has('KeyW')||keysDown.has('ArrowUp')) f+=1;
  if (keysDown.has('KeyS')||keysDown.has('ArrowDown')) f-=1;
  if (keysDown.has('KeyD')||keysDown.has('ArrowRight')) r+=1;
  if (keysDown.has('KeyA')||keysDown.has('ArrowLeft')) r-=1;
  return {f,r};
}

// touch joystick
const joyZone = document.getElementById('joystick-zone');
const joyBase = document.getElementById('joy-base');
const joyKnob = document.getElementById('joy-knob');
let joyActive = false, joyTouchId = null, joyOrigin = {x:0,y:0};
let joyVec = {x:0,y:0};

function isTouchDevice(){ return 'ontouchstart' in window || navigator.maxTouchPoints > 0; }
if (isTouchDevice()) joyZone.classList.add('active');

joyZone.addEventListener('touchstart', e => {
  const t = e.changedTouches[0];
  joyActive = true; joyTouchId = t.identifier;
  joyOrigin = { x: t.clientX, y: t.clientY };
  joyBase.style.left = (t.clientX - 55) + 'px';
  joyBase.style.top = (t.clientY - 55) + 'px';
  joyKnob.style.left = t.clientX + 'px';
  joyKnob.style.top = t.clientY + 'px';
}, {passive:true});

joyZone.addEventListener('touchmove', e => {
  for (const t of e.changedTouches){
    if (t.identifier !== joyTouchId) continue;
    let dx = t.clientX - joyOrigin.x;
    let dy = t.clientY - joyOrigin.y;
    const maxR = 55;
    const dist = Math.min(Math.hypot(dx,dy), maxR);
    const ang = Math.atan2(dy,dx);
    dx = Math.cos(ang)*dist; dy = Math.sin(ang)*dist;
    joyKnob.style.left = (joyOrigin.x+dx) + 'px';
    joyKnob.style.top = (joyOrigin.y+dy) + 'px';
    joyVec = { x: dx/maxR, y: dy/maxR };
  }
}, {passive:true});

function resetJoy(){
  joyActive = false; joyTouchId = null; joyVec = {x:0,y:0};
  joyKnob.style.left = joyOrigin.x + 'px';
  joyKnob.style.top = joyOrigin.y + 'px';
}
joyZone.addEventListener('touchend', resetJoy);
joyZone.addEventListener('touchcancel', resetJoy);

// VR controller thumbstick
let xrMoveX = 0, xrMoveY = 0;
function pollXRInput(session){
  if (!session) return;
  for (const source of session.inputSources){
    if (source.gamepad && source.gamepad.axes.length >= 4){
      xrMoveX = source.gamepad.axes[2] || source.gamepad.axes[0] || 0;
      xrMoveY = source.gamepad.axes[3] || source.gamepad.axes[1] || 0;
    }
  }
}

const WALK_SPEED = 4.2; // m/s, easy relaxed pace
const WORLD_LIMIT = 95; // keep the walker within the island-dotted clearing

function updateMovement(dt){
  const kb = computeKeyboardMove();
  let f = kb.f - joyVec.y - xrMoveY; // joystick/xr "up" is negative y
  let r = kb.r + joyVec.x + xrMoveX;
  f = Math.max(-1, Math.min(1, f));
  r = Math.max(-1, Math.min(1, r));
  if (f===0 && r===0) return;

  const dir = new THREE.Vector3(r, 0, -f);
  if (dir.lengthSq() > 1) dir.normalize();
  dir.applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const camObj = renderer.xr.isPresenting ? renderer.xr.getCamera() : camera;

  const moveX = dir.x * WALK_SPEED * dt;
  const moveZ = dir.z * WALK_SPEED * dt;

  if (renderer.xr.isPresenting){
    xrRig.position.x += moveX;
    xrRig.position.z += moveZ;
    xrRig.position.x = Math.max(-WORLD_LIMIT, Math.min(WORLD_LIMIT, xrRig.position.x));
    xrRig.position.z = Math.max(-WORLD_LIMIT, Math.min(WORLD_LIMIT, xrRig.position.z));
  } else {
    camera.position.x += moveX;
    camera.position.z += moveZ;
    camera.position.x = Math.max(-WORLD_LIMIT, Math.min(WORLD_LIMIT, camera.position.x));
    camera.position.z = Math.max(-WORLD_LIMIT, Math.min(WORLD_LIMIT, camera.position.z));
  }
}

// XR rig: a group holding the camera so we can translate the player in VR
const xrRig = new THREE.Group();
scene.add(xrRig);

// ================= WebXR setup =================
const vrBtn = document.getElementById('vr-btn');
let xrSession = null;
async function setupXR(){
  if (!('xr' in navigator)) { vrBtn.textContent = 'VR not supported'; vrBtn.disabled = true; return; }
  try {
    const supported = await navigator.xr.isSessionSupported('immersive-vr');
    if (!supported){ vrBtn.textContent = 'VR not available'; vrBtn.disabled = true; return; }
  } catch(e){ vrBtn.textContent = 'VR not available'; vrBtn.disabled = true; return; }

  vrBtn.addEventListener('click', async () => {
    if (renderer.xr.isPresenting) return;
    try {
      xrSession = await navigator.xr.requestSession('immersive-vr', {
        optionalFeatures: ['local-floor', 'bounded-floor']
      });
      renderer.xr.setSession(xrSession);
      xrRig.add(camera);
      vrBtn.textContent = 'In VR...';
      xrSession.addEventListener('end', () => {
        vrBtn.textContent = 'Enter VR';
        xrRig.remove(camera);
        xrSession = null;
      });
    } catch(err){ console.log('XR session request failed', err); }
  });
}
setupXR();

// ================= UI toggles =================
const uiEl = document.getElementById('ui');
const hintEl = document.getElementById('hint');
document.getElementById('hide-btn').addEventListener('click', () => {
  uiEl.classList.toggle('hidden-ui');
  hintEl.style.opacity = hintEl.style.opacity === '0' ? '1' : '0';
});

document.getElementById('enter-btn').addEventListener('click', () => {
  document.getElementById('start-screen').classList.add('fade-out');
  setTimeout(() => document.getElementById('start-screen').style.display = 'none', 1100);
  if (!audioCtx) initAudio();
});

// ================= Animation loop =================
const clock = new THREE.Clock();

function animateFrame(){
  const dt = Math.min(clock.getDelta(), 0.1);
  const elapsed = clock.elapsedTime;

  updateBreath(dt);
  pollXRInput(xrSession);
  updateMovement(dt);

  if (!renderer.xr.isPresenting){
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
    camera.position.y = 1.7 + Math.sin(elapsed*0.15)*0.05;
  } else {
    xrRig.rotation.y = yaw * 0.0; // let headset own rotation; rig only translates
  }

  stars.rotation.y += dt * 0.004;
  stars2.rotation.y -= dt * 0.0025;

  // island bob + slow orbit-ish drift
  islands.forEach((isl, i) => {
    isl.position.y = isl.userData.baseY + Math.sin(elapsed*0.3 + isl.userData.bobSeed)*0.6;
    isl.rotation.y += dt * 0.02;
  });

  // fireflies drift
  const posAttr = fireflyGeo.attributes.position;
  for (let i=0;i<fireflyCount;i++){
    const seed = fSeed[i];
    posAttr.array[i*3]   += Math.sin(elapsed*0.3 + seed) * 0.003;
    posAttr.array[i*3+1] += Math.cos(elapsed*0.2 + seed*1.3) * 0.002;
    posAttr.array[i*3+2] += Math.sin(elapsed*0.25 + seed*0.7) * 0.003;
  }
  posAttr.needsUpdate = true;

  // mist ripple
  const mp = mistGeo.attributes.position;
  for (let i=0;i<mp.count;i++){
    const bx = mistBase[i*3], by = mistBase[i*3+1], bz = mistBase[i*3+2];
    mp.array[i*3+2] = bz + Math.sin(elapsed*0.4 + bx*0.05 + by*0.05) * 0.5;
  }
  mp.needsUpdate = true;

  // orb subtle color pulse
  const t = (Math.sin(elapsed*0.5)+1)/2;
  orb.material.color.setRGB(1, 0.91 - t*0.05, 0.76 + t*0.08);

  renderer.render(scene, camera);
}
renderer.setAnimationLoop(animateFrame);
</script>
